<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>投資理由ノート</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@500;600&family=Noto+Sans+JP:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --paper:#FAF9F6;--card:#FFFFFF;--ink:#22242A;--sub:#6B6F76;--faint:#9A9EA5;
  --indigo:#2E4A6B;--indigo-bg:#EDF1F6;--line:#E4E2DC;
  --alive:#1D6E5A;--alive-bg:#E7F2EE;
  --shaky:#9A6A14;--shaky-bg:#F8EFDC;
  --broken:#A8402F;--broken-bg:#F8E8E4;
  --serif:'Noto Serif JP',serif;--sans:'Noto Sans JP',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.7;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:20px 16px 100px}
header{display:flex;align-items:baseline;justify-content:space-between;padding:6px 2px 20px}
header h1{font-family:var(--serif);font-size:19px;font-weight:600;letter-spacing:.06em;color:var(--indigo)}
header .hr{display:flex;gap:10px;align-items:baseline}
header span{font-size:11px;color:var(--faint);letter-spacing:.08em}
header button{background:none;border:none;font-size:11px;color:var(--sub);cursor:pointer;font-family:var(--sans);text-decoration:underline}
.card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:12px}
.lbl{font-size:12px;color:var(--sub);margin-bottom:6px;letter-spacing:.04em}
input,textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:11px 12px;font-size:15px;font-family:var(--sans);background:var(--card);color:var(--ink)}
input:focus,textarea:focus{outline:none;border-color:var(--indigo)}
textarea{resize:none;line-height:1.6}
.field{margin-bottom:14px}
.btn{display:block;width:100%;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:500;font-family:var(--sans);cursor:pointer;background:var(--indigo);color:#fff;margin-bottom:8px}
.btn:active{transform:scale(.985)}
.btn.ghost{background:transparent;color:var(--indigo);border:1.5px solid var(--indigo)}
.btn.quiet{background:transparent;color:var(--sub);border:none;font-size:13px;padding:8px}
.btn:disabled{opacity:.4;cursor:default}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:4px}
.chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:7px 14px;font-size:13px;color:var(--ink);cursor:pointer;font-family:var(--sans);line-height:1.5}
.chip.on{border-color:var(--indigo);background:var(--indigo-bg);color:var(--indigo);font-weight:500}
.chip.wide{border-radius:10px;width:100%;text-align:left}
.note-row{display:flex;gap:12px;align-items:flex-start;padding:14px 2px;border-bottom:1px solid var(--line);cursor:pointer}
.note-row:last-child{border-bottom:none}
.hanko{flex:none;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;font-weight:600;transform:rotate(-4deg);border:2px solid}
.hanko.alive{color:var(--alive);border-color:var(--alive);background:var(--alive-bg)}
.hanko.shaky{color:var(--shaky);border-color:var(--shaky);background:var(--shaky-bg)}
.hanko.broken{color:var(--broken);border-color:var(--broken);background:var(--broken-bg)}
.hanko.none{color:var(--faint);border-color:var(--line);background:var(--paper);font-size:10px;transform:none;font-family:var(--sans);text-align:center;line-height:1.3}
.hanko.skip{color:var(--sub);border-color:var(--sub);background:var(--paper);font-size:12px}
.nm{flex:1;min-width:0}
.nm-name{font-weight:500;font-size:15px}
.nm-reason{font-size:13px;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nm-meta{font-size:11px;color:var(--faint);margin-top:2px}
.row-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.need-check{font-size:10px;color:var(--shaky);font-weight:600}
.match-dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0}
.match-dot.ok{background:var(--alive)}
.match-dot.part{background:var(--shaky)}
.match-dot.ng{background:var(--broken)}
.match-dot.na{background:var(--faint)}
.empty{text-align:center;padding:48px 12px;color:var(--sub)}
.empty b{font-family:var(--serif);font-size:17px;color:var(--ink);display:block;margin-bottom:8px}
.fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:calc(100% - 64px);max-width:416px;box-shadow:0 4px 16px rgba(34,36,42,.2)}
.back{background:none;border:none;font-size:13px;color:var(--sub);cursor:pointer;font-family:var(--sans);padding:0 0 12px;display:block}
.kicker{font-size:11px;color:var(--faint);letter-spacing:.1em;margin-bottom:4px}
h2{font-family:var(--serif);font-size:18px;font-weight:600;margin-bottom:14px}
.quote{border-left:3px solid var(--indigo);padding:4px 0 4px 12px;font-size:14px;margin:8px 0}
.basis-tag{display:inline-block;font-size:11px;color:var(--sub);background:var(--paper);border:1px solid var(--line);border-radius:6px;padding:2px 8px;margin-top:6px}
.fact-list{list-style:none;margin:6px 0 0}
.fact-list li{font-size:14px;padding:5px 0;border-bottom:1px solid var(--line);display:flex;gap:8px;align-items:baseline}
.fact-list li:last-child{border:none}
.fact-list li::before{content:"▸";color:var(--indigo);flex:none;font-size:12px}
.caution-list{list-style:none;margin:6px 0 0}
.caution-list li{font-size:14px;padding:5px 0;display:flex;gap:8px;align-items:baseline}
.caution-list li::before{content:"！";color:var(--shaky);flex:none;font-size:12px;font-weight:600}
.sec{margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}
.type-badge{display:inline-block;font-size:11px;border-radius:6px;padding:2px 10px;margin-left:8px;background:var(--indigo-bg);color:var(--indigo);vertical-align:2px}
.match-badge{display:inline-block;font-size:14px;font-weight:600;border-radius:8px;padding:6px 14px;margin:4px 0 8px;border:1.5px solid}
.match-badge.ok{color:var(--alive);border-color:var(--alive);background:var(--alive-bg)}
.match-badge.part{color:var(--shaky);border-color:var(--shaky);background:var(--shaky-bg)}
.match-badge.ng{color:var(--broken);border-color:var(--broken);background:var(--broken-bg)}
.match-badge.na{color:var(--sub);border-color:var(--line);background:var(--paper)}
.sec-label{font-size:11px;font-weight:600;color:var(--indigo);letter-spacing:.1em;margin:0 0 6px;text-transform:uppercase}
.summary-text{font-size:15px;line-height:1.8;color:var(--ink);margin:8px 0 16px}
.filter-tabs{display:flex;gap:0;margin-bottom:12px;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.filter-tab{flex:1;border:none;padding:9px 4px;font-size:13px;font-family:var(--sans);cursor:pointer;background:var(--card);color:var(--sub)}
.filter-tab.on{background:var(--indigo);color:#fff;font-weight:500}
.wp-item{border:1px solid var(--line);border-radius:10px;padding:10px 12px;margin-top:8px;background:var(--card)}
.wp-what{font-weight:500;font-size:14px}
.wp-where{font-size:12px;color:var(--sub);margin-top:2px}
.wp-alert{font-size:12px;color:var(--shaky);margin-top:4px;font-weight:500}
.watch-list{list-style:none;margin:6px 0 0}
.watch-list li{font-size:14px;padding:5px 0;display:flex;gap:8px;align-items:baseline}
.watch-list li::before{content:"◎";color:var(--indigo);flex:none;font-size:12px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--line);border-top-color:var(--indigo);border-radius:50%;animation:sp .7s linear infinite;vertical-align:-2px;margin-right:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.wait{text-align:center;padding:48px 16px}
.wait .wname{font-family:var(--serif);font-size:18px;margin-bottom:12px}
.wait p{color:var(--sub);font-size:13px;margin-top:8px}
.err{background:var(--broken-bg);color:var(--broken);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px}
.info{background:var(--indigo-bg);color:var(--indigo);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:12px}
.stamp-row{display:flex;gap:8px;margin-top:10px}
.stamp-btn{flex:1;border-radius:10px;padding:10px 4px;font-size:13px;font-family:var(--sans);cursor:pointer;border:1px solid var(--line);background:var(--card)}
.stamp-btn.alive{color:var(--alive);border-color:var(--alive)}
.stamp-btn.shaky{color:var(--shaky);border-color:var(--shaky)}
.stamp-btn.broken{color:var(--broken);border-color:var(--broken)}
.stamp-btn.sel{font-weight:600}
.stamp-btn.sel.alive{background:var(--alive-bg)}
.stamp-btn.sel.shaky{background:var(--shaky-bg)}
.stamp-btn.sel.broken{background:var(--broken-bg)}
.tl-item{display:flex;gap:12px;padding:10px 0}
.tl-left{display:flex;flex-direction:column;align-items:center;width:32px;flex-shrink:0}
.tl-hanko{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:13px;font-weight:600;border:2px solid;flex-shrink:0}
.tl-hanko.alive{color:var(--alive);border-color:var(--alive);background:var(--alive-bg)}
.tl-hanko.shaky{color:var(--shaky);border-color:var(--shaky);background:var(--shaky-bg)}
.tl-hanko.broken{color:var(--broken);border-color:var(--broken);background:var(--broken-bg)}
.tl-hanko.none{color:var(--faint);border-color:var(--line);background:var(--paper);font-size:9px;font-family:var(--sans);text-align:center;line-height:1.2}
.tl-hanko.skip{color:var(--sub);border-color:var(--sub);background:var(--paper);font-size:11px}
.tl-line{flex:1;width:2px;background:var(--line);margin:4px 0;min-height:8px}
.tl-body{flex:1;min-width:0;padding-bottom:6px}
.tl-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:2px}
.foot{font-size:11px;color:var(--faint);text-align:center;padding:20px 12px 0;line-height:1.9}
.hint{font-size:11px;color:var(--faint);margin-top:6px;line-height:1.6}
.login-wrap{max-width:380px;margin:10vh auto 0;padding:0 16px}
.login-logo{text-align:center;font-family:var(--serif);font-size:24px;font-weight:600;color:var(--indigo);letter-spacing:.08em;margin-bottom:6px}
.login-sub{text-align:center;font-size:13px;color:var(--sub);margin-bottom:24px}
.action-divider{border:none;border-top:1px solid var(--line);margin:12px 0 4px}
.detail-header{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px}
.detail-hanko{flex:none;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:13px;font-weight:600;transform:rotate(-4deg);border:2px solid}
.detail-hanko.alive{color:var(--alive);border-color:var(--alive);background:var(--alive-bg)}
.detail-hanko.shaky{color:var(--shaky);border-color:var(--shaky);background:var(--shaky-bg)}
.detail-hanko.broken{color:var(--broken);border-color:var(--broken);background:var(--broken-bg)}
.detail-hanko.none{color:var(--faint);border-color:var(--line);background:var(--paper);font-size:9px;transform:none;font-family:var(--sans);text-align:center;line-height:1.2}
.detail-hanko.skip{color:var(--sub);border-color:var(--sub);background:var(--paper);font-size:11px}
.stamp-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.stamp-pill{border-radius:999px;padding:5px 12px;font-size:12px;font-family:var(--sans);cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--sub)}
.stamp-pill.alive{color:var(--alive);border-color:var(--alive)}
.stamp-pill.shaky{color:var(--shaky);border-color:var(--shaky)}
.stamp-pill.broken{color:var(--broken);border-color:var(--broken)}
.stamp-pill.sel.alive{background:var(--alive-bg);font-weight:600}
.stamp-pill.sel.shaky{background:var(--shaky-bg);font-weight:600}
.stamp-pill.sel.broken{background:var(--broken-bg);font-weight:600}
.port-bar{display:flex;height:18px;border-radius:9px;overflow:hidden;border:1px solid var(--line);margin:10px 0 8px}
.port-seg{height:100%}
.health-line{display:flex;gap:14px;font-size:12px;color:var(--sub);margin-bottom:4px}
.health-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:1px}
.karte-q{font-size:12px;font-weight:600;color:var(--indigo);margin-bottom:6px;letter-spacing:.04em}
.exit-card{border-left:3px solid var(--broken)}
.hold-meta{font-size:12px;color:var(--sub);margin-top:4px}
.hold-edit-link{background:none;border:none;font-size:11px;color:var(--sub);text-decoration:underline;cursor:pointer;font-family:var(--sans);padding:0;margin-top:4px}
.port-sep{font-size:11px;color:var(--faint);letter-spacing:.06em;margin:14px 2px 4px}
@media(prefers-reduced-motion:reduce){.spinner{animation:none}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ====== 設定（Supabaseの値に置き換えてください） ======
const SUPABASE_URL = "https://qiiyptjhowlcnpowvbyv.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_058rgCerAshVQ3IGEnypTA_vgi6dg2M";
// ====================================================

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const PERIODS=['1年未満','1〜5年','5年以上','決めてない'];
const BROKERS=[
  ['SBI証券','https://www.sbisec.co.jp/'],
  ['楽天証券','https://www.rakuten-sec.co.jp/'],
  ['マネックス証券','https://www.monex.co.jp/']
];
let S={session:null,recs:[],view:'list',d:null,res:null,err:null,info:null,did:null,rres:null,rloading:false,notifSaved:false,loginMsg:null,remaining:null,loginStep:'email',loginEmail:'',loginTab:'login',guest:localStorage.getItem('rinote_guest')==='1',recheckOpen:false,recheckData:null,filter:'all',histOpen:false,holdEdit:false,tab:'note'};

function fmt(ts){const d=new Date(ts);return d.getFullYear()+'.'+(d.getMonth()+1)+'.'+d.getDate()}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function lastStatus(r){const c=r.checks;return c&&c.length?c[c.length-1].status:null}
function hanko(r){
  if(r.decision==='見送り')return['skip','見送'];
  const s=lastStatus(r);
  if(s==='生きてる')return['alive','生'];
  if(s==='揺らいでる')return['shaky','揺'];
  if(s==='崩れた')return['broken','崩'];
  return['none','未\n判定'];
}
const GUEST_KEY='rinote_recs';
function guestRecs(){try{return JSON.parse(localStorage.getItem(GUEST_KEY)||'[]')}catch(_){return[]}}
function guestSave(recs){localStorage.setItem(GUEST_KEY,JSON.stringify(recs))}
async function dbUpdate(id,fields){
  if(S.guest){
    const recs=guestRecs();
    const rec=recs.find(x=>String(x.id)===String(id));
    if(rec)Object.assign(rec,fields);
    guestSave(recs);
    return null;
  }
  const {error}=await sb.from('records').update(fields).eq('id',id);
  return error;
}
async function loadRecs(){
  if(S.guest){S.recs=guestRecs();return}
  const {data,error}=await sb.from('records').select('*').order('created_at',{ascending:true});
  if(!error)S.recs=data||[];
}
async function api(kind,data){
  const token=S.guest?'guest':S.session.access_token;
  const res=await fetch('/api/check',{
    method:'POST',
    headers:{'Content-Type':'application/json',Authorization:`Bearer ${token}`},
    body:JSON.stringify({kind,data})
  });
  const out=await res.json();
  if(!res.ok)throw new Error(out.error||'照合に失敗しました');
  if(typeof out.remaining==='number')S.remaining=out.remaining;
  return out.result;
}
function render(){document.getElementById('app').innerHTML=(S.session||S.guest)?`<div class="wrap">${page()}</div>`:pLogin();bind()}
function page(){
  const v=S.view;
  if(v==='form')return pForm();
  if(v==='checking')return pWait();
  if(v==='result')return pResult();
  if(v==='rewrite')return pRewrite();
  if(v==='miokuri')return pMiokuri();
  if(v==='confirm')return pConfirm();
  if(v==='detail')return pDetail();
  return pList();
}
function pLogin(){
  if(S.loginStep==='otp'){
    return `<div class="login-wrap">
      <p class="login-logo">投資理由ノート</p>
      <p class="login-sub">理由を記録し、事実と照らすノート</p>
      ${S.loginMsg?`<div class="info">${esc(S.loginMsg)}</div>`:''}
      ${S.err?`<div class="err">${esc(S.err)}</div>`:''}
      <div class="card">
        <p class="lbl" style="margin-bottom:10px"><b>${esc(S.loginEmail)}</b> に6桁のコードを送りました</p>
        <div class="field"><input id="lotp" type="text" inputmode="numeric" pattern="[0-9]*" maxlength="6" placeholder="000000" autocomplete="one-time-code" style="font-size:26px;letter-spacing:.3em;text-align:center;padding:14px 12px"></div>
        <button class="btn" data-a="verify-otp">ログインする</button>
        <button class="btn quiet" data-a="back-email">← メールアドレスを変える</button>
      </div>
      <p class="foot">本アプリは投資助言ではありません。売買の推奨・株価予測は行いません。</p>
    </div>`;
  }
  const tab=S.loginTab||'login';
  return `<div class="login-wrap">
    <p class="login-logo">投資理由ノート</p>
    <p class="login-sub">理由を記録し、事実と照らすノート</p>
    ${S.loginMsg?`<div class="info">${esc(S.loginMsg)}</div>`:''}
    ${S.err?`<div class="err">${esc(S.err)}</div>`:''}
    <div class="card">
      <div style="display:flex;gap:0;margin-bottom:16px;border:1px solid var(--line);border-radius:10px;overflow:hidden">
        <button data-a="tab-login" style="flex:1;border:none;padding:10px;font-size:14px;font-family:var(--sans);cursor:pointer;${tab==='login'?'background:var(--indigo);color:#fff;font-weight:500':'background:var(--card);color:var(--sub)'}">ログイン</button>
        <button data-a="tab-signup" style="flex:1;border:none;padding:10px;font-size:14px;font-family:var(--sans);cursor:pointer;${tab==='signup'?'background:var(--indigo);color:#fff;font-weight:500':'background:var(--card);color:var(--sub)'}">新規登録</button>
      </div>
      <div class="field"><p class="lbl">メールアドレス</p><input id="lemail" type="email" placeholder="you@example.com" value="${esc(S.loginEmail)}"></div>
      <button class="btn" data-a="send-otp">${tab==='signup'?'登録コードを送る':'ログインコードを送る'}</button>
      <p class="hint">${tab==='signup'
        ?'パスワード不要。届いたメールの6桁コードを入力すると登録が完了します。'
        :'登録済みのメールアドレスに6桁のコードを送ります。一度ログインすると次回からは不要です。'}</p>
    </div>
    <button class="btn ghost" data-a="guest">ログインせずに試す</button>
    <p class="hint" style="text-align:center">お試しモードの記録はこのブラウザだけに保存されます。</p>
    <p class="foot">本アプリは投資助言ではありません。売買の推奨・株価予測は行いません。</p>
  </div>`;
}
function pList(){
  const now=Date.now();
  const MS90=90*24*60*60*1000;

  let filtered;
  if(S.filter==='skip'){
    filtered=S.recs.filter(r=>r.decision==='見送り');
  }else if(S.filter==='active'){
    filtered=S.recs.filter(r=>r.decision!=='見送り');
  }else{
    filtered=S.recs.slice();
  }

  let body;
  if(!S.recs.length){
    body=`<div class="empty"><b>最初の1ページは白紙です</b><p>気になる銘柄と、その理由をひとこと。<br>30秒で最初の記録ができます。</p></div>`;
  }else if(!filtered.length){
    body=`<div class="empty"><p>該当する記録がありません</p></div>`;
  }else{
    body=filtered.slice().reverse().map(r=>{
      const[c,ch]=hanko(r);
      const checks=r.checks||[];
      const lastCheck=checks.length?checks[checks.length-1]:null;
      const lastCheckDate=lastCheck?fmt(lastCheck.ts):'';
      const checkCount=checks.length;
      const isMio=r.decision==='見送り';

      // last match_level dot
      let dotHtml='';
      if(lastCheck&&lastCheck.match_level){
        let dotCls='na';
        if(lastCheck.match_level==='一致')dotCls='ok';
        else if(lastCheck.match_level==='一部一致')dotCls='part';
        else if(lastCheck.match_level==='現時点の開示とは一致しない')dotCls='ng';
        dotHtml=`<span class="match-dot ${dotCls}"></span>`;
      }

      // 要確認 indicator: last check older than 90 days, not 見送り
      let needCheckHtml='';
      if(!isMio&&lastCheck&&(now-lastCheck.ts)>MS90){
        needCheckHtml=`<span class="need-check">要確認</span>`;
      }

      return `<div class="note-row" data-id="${r.id}">
        <div class="hanko ${c}">${ch}</div>
        <div class="nm">
          <p class="nm-name">${esc(r.name)}</p>

        </div>
        <div class="row-right">
          ${dotHtml}
          ${lastCheckDate?`<span style="font-size:10px;color:var(--faint)">${lastCheckDate}</span>`:''}
          ${needCheckHtml}
        </div>
      </div>`;
    }).join('');
  }

  const f=S.filter||'all';
  const hasHold=S.recs.some(r=>r.qty>0&&r.decision!=='見送り');
  const tab=hasHold?(S.tab||'note'):'note';

  let mainHtml;

    const holds=S.recs.filter(r=>r.qty>0&&r.decision!=='見送り').map(r=>({r,v:r.qty*(r.avg_price||0)}));
    const total=holds.reduce((s,h)=>s+h.v,0)||1;

    const counts={'生きてる':0,'揺らいでる':0,'崩れた':0};

      const[hc]=hanko(h.r);

    const fmtV=v=>v>=10000?(v/10000).toFixed(1)+'万円':Math.round(v).toLocaleString()+'円';
    const rowsHtml=holds.slice().sort((a,b)=>b.v-a.v).map(h=>{
      const r=h.r;
      const[c,ch]=hanko(r);
      const checks=r.checks||[];
      const lastCheck=checks.length?checks[checks.length-1]:null;
      let dotCls='na';
      if(lastCheck&&lastCheck.match_level){
        if(lastCheck.match_level==='一致')dotCls='ok';
        else if(lastCheck.match_level==='一部一致')dotCls='part';
        else if(lastCheck.match_level==='現時点の開示とは一致しない')dotCls='ng';
      }
      return `<div class="note-row" data-id="${r.id}">
        <div class="hanko ${c}">${ch}</div>
        <div class="nm">
          <p class="nm-name">${esc(r.name)}</p>
          <p class="nm-reason">「${esc(r.reason)}」</p>
          <p class="nm-meta">${fmtV(h.v)}</p>
        </div>
        <div class="row-right">
          <span style="font-weight:600;font-size:14px">${(h.v/total*100).toFixed(1)}%</span>
          ${(lastCheck&&lastCheck.match_level)?`<span class="match-dot ${dotCls}"></span>`:''}
        </div>
      </div>`;
    }).join('');
    const others=S.recs.filter(r=>!(r.qty>0)&&r.decision!=='見送り');
    const othersHtml=others.length?`<p class="port-sep">保有情報のない記録</p>
    <div class="card" style="padding:6px 16px">${others.slice().reverse().map(r=>{
      const[c,ch]=hanko(r);
      return `<div class="note-row" data-id="${r.id}">
        <div class="hanko ${c}">${ch}</div>
        <div class="nm">
          <p class="nm-name">${esc(r.name)}</p>
          <p class="nm-reason">「${esc(r.reason)}」</p>
          <p class="nm-meta">${fmt(r.created_at)}</p>
        </div>
      </div>`;

    mainHtml=`<div class="card">
      <p class="sec-label">理由の健康状態</p>

        <span><span class="health-dot" style="background:var(--alive)"></span>生きてる ${counts['生きてる']}</span>
        <span><span class="health-dot" style="background:var(--shaky)"></span>揺らいでる ${counts['揺らいでる']}</span>
        <span><span class="health-dot" style="background:var(--broken)"></span>崩れた ${counts['崩れた']}</span>
      </div>
    </div>
    <div class="card" style="padding:6px 16px">${rowsHtml}</div>
    ${othersHtml}
    <p class="hint" style="text-align:center">構成比は取得単価ベースの概算です。最新の株価は反映されません。</p>`;
  }else{
    mainHtml=`${S.recs.length?`<div class="filter-tabs">
      <button class="filter-tab${f==='all'?' on':''}" data-a="filter-all">すべて</button>
      <button class="filter-tab${f==='active'?' on':''}" data-a="filter-active">検討中</button>
      <button class="filter-tab${f==='skip'?' on':''}" data-a="filter-skip">見送り</button>
    </div>`:''}
    <div class="card" style="padding:6px 16px">${body}</div>
    ${S.recs.length?`<p class="hint" style="text-align:center">判子の意味 ── 生：理由が生きてる ・ 揺：揺らいでる ・ 崩：崩れた ・ 見送：見送り</p>`:''}`;
  }

  return `<header><h1>投資理由ノート</h1><div class="hr"><span>${S.guest?'お試しモード':'RINOTE'}</span><button data-a="logout">${S.guest?'終了する':'ログアウト'}</button></div></header>

  <button class="btn fab" data-a="new">銘柄を記録する</button>`;

function matchBadge(level){
  if(!level)return'';

  return `<span class="match-badge ${cls}">${esc(level)}</span>`;

function watchItems(list){

function tlHanko(status){
  if(status==='生きてる')return['alive','生'];

  if(status==='見送り')return['skip','見'];
  return['none','未'];
}

      ${['生きてる','揺らいでる','崩れた'].map((s,i)=>{
        const cls=['alive','shaky','broken'][i];
        return `<button class="stamp-pill ${cls}${lastStatus(r)===s?' sel':''}" data-mst="${s}">${s}</button>`;
      }).join('')}
    </div>
    <p class="hint" style="margin-top:6px">判子を変えると履歴に残ります</p>`:''}
  </div>
  ${S.err?`<div class="err">${esc(S.err)}</div>`:''}
  ${isMio&&!rr?`<button class="btn" data-a="recheck" ${S.rloading?'disabled':''}>${S.rloading?'<span class="spinner"></span>確認中…':'答え合わせをする'}</button>`:''}
  ${rr?`<div class="card">
    <p class="lbl">${isMio?'答え合わせ ── 見送ったあと、何が起きたか':'最新の照合結果'}</p>
    ${!isMio&&rr.match_level?matchBadge(rr.match_level):''}
    ${rr.summary?`<p class="summary-text">${esc(rr.summary)}</p>`:''}
    <p style="font-size:14px">${esc(rr.conclusion||'')}</p>
    ${(rr.facts||[]).length?`<ul class="fact-list">${(rr.facts||[]).map(f=>`<li>${esc(f)}</li>`).join('')}</ul>`:''}
    ${rr.basis?`<span class="basis-tag">出典：${esc(rr.basis)}</span>`:''}
    ${!isMio?`<p class="lbl" style="margin-top:14px">この理由の判定を押してください</p>
    <div class="stamp-row">
      <button class="stamp-btn alive" data-st="生きてる">生きてる</button>
      <button class="stamp-btn shaky" data-st="揺らいでる">揺らいでる</button>
      <button class="stamp-btn broken" data-st="崩れた">崩れた</button>
    </div>`:`<button class="btn quiet" data-a="re-close" style="margin-top:8px">記録して閉じる</button>`}
  </div>`:''}
  <div class="card">
    <p class="karte-q">❓ ${isMio?'なぜ見送った？':'なぜ買った？'}</p>
    <div class="quote">「${esc(r.reason)}」</div>
    ${(checks[0]&&checks[0].match_level)?matchBadge(checks[0].match_level):''}
  </div>
  ${r.final_thought?`<div class="card">
    <p class="karte-q">💭 照合を見て、どう考えた？</p>
    <p style="font-size:14px">${esc(r.final_thought)}</p>
  </div>`:''}
  ${r.anxiety?`<div class="card">
    <p class="karte-q">🤔 買うとき、何が不安だった？</p>
    <p style="font-size:14px">${esc(r.anxiety)}</p>
  </div>`:''}
  ${(!isMio&&r.signal)?`<div class="card exit-card">
    <p class="karte-q">🚪 どうなったら手放す？</p>
    <p style="font-size:15px;font-weight:500">${esc(r.signal)}</p>
  </div>`:''}
  ${(checks[0]&&(checks[0].watch_points||[]).length)?`<div class="card">
    <p class="karte-q">👀 ふだん何を見ておく？</p>
    ${watchItems(checks[0].watch_points)}
  </div>`:''}
  ${histHtml}
  ${!isMio?`
    ${S.recheckOpen?`<div class="card">
      <p class="lbl" style="margin-bottom:12px">理由を変えて再照合</p>
      <div class="field"><p class="lbl">銘柄名</p><input id="rc-name" value="${esc(rd.name)}"></div>
      <div class="field"><p class="lbl">投資の理由</p><textarea id="rc-reason" rows="3">${esc(rd.reason)}</textarea></div>
      <div class="field"><p class="lbl">保有期間（任意）</p><div class="chips">${PERIODS.map(p=>`<button class="chip${rd.period===p?' on':''}" data-rper="${esc(p)}">${esc(p)}</button>`).join('')}</div></div>
      <div class="field"><p class="lbl">不安なこと（任意）</p><textarea id="rc-anxiety" rows="2">${esc(rd.anxiety)}</textarea></div>
      <button class="btn" data-a="recheck-submit" ${S.rloading?'disabled':''}>${S.rloading?'<span class="spinner"></span>確認中…':'この内容で照合する'}</button>
      <button class="btn quiet" data-a="recheck-close">キャンセル</button>
    </div>`
    :`<button class="btn ghost" data-a="recheck-open" ${S.rloading?'disabled':''}>理由を変えて再照合する</button>`}
  `:''}
  <button class="btn quiet" data-a="del">この記録を削除</button>`;
}
function bind(){
  document.querySelectorAll('[data-a]').forEach(el=>el.onclick=()=>act(el.dataset.a));
  document.querySelectorAll('[data-id]').forEach(el=>el.onclick=()=>{S.did=el.dataset.id;S.err=null;S.info=null;S.rres=null;S.histOpen=false;S.holdEdit=false;S.view='detail';render()});
  document.querySelectorAll('[data-per]').forEach(el=>el.onclick=()=>{gForm();S.d.period=el.dataset.per;render()});
  document.querySelectorAll('[data-opt]').forEach(el=>el.onclick=()=>{
    const o=el.dataset.opt;
    S.d.reason=(S.d.reason===o&&S.d.origReason)?S.d.origReason:o;
    render();
  });
  document.querySelectorAll('[data-sig]').forEach(el=>el.onclick=()=>{gConfirm();S.d.signal=S.d.signal===el.dataset.sig?'':el.dataset.sig;render()});
  document.querySelectorAll('[data-fth]').forEach(el=>el.onclick=()=>{gConfirm();S.d.finalThought=S.d.finalThought===el.dataset.fth?'':el.dataset.fth;render()});
  document.querySelectorAll('[data-st]').forEach(el=>el.onclick=()=>stamp(el.dataset.st));
  document.querySelectorAll('[data-cst]').forEach(el=>el.onclick=()=>{gConfirm();S.d.stamp=el.dataset.cst;render()});
  document.querySelectorAll('[data-mst]').forEach(el=>el.onclick=()=>manualStamp(el.dataset.mst));
  document.querySelectorAll('[data-rper]').forEach(el=>el.onclick=()=>{if(!S.recheckData)S.recheckData={};S.recheckData.period=el.dataset.rper;render()});
}
function gForm(){
  const fn=document.getElementById('fn'),fr=document.getElementById('fr'),fa=document.getElementById('fa');
  if(fn)S.d.name=fn.value.trim();
  if(fr)S.d.reason=fr.value.trim();
  if(fa)S.d.anxiety=fa.value.trim();
}
function gConfirm(){
  const fs=document.getElementById('fsig');
  if(fs)S.d.customSignal=fs.value.trim();
  const ft=document.getElementById('ffth');
  if(ft)S.d.customThought=ft.value.trim();
  const fq=document.getElementById('fqty'),fp=document.getElementById('fprice');
  if(fq)S.d.qty=fq.value!==''?parseFloat(fq.value):null;
  if(fp)S.d.avgPrice=fp.value!==''?parseFloat(fp.value):null;
}
async function act(a){
  if(a==='tab-login'){S.loginTab='login';S.err=null;S.loginMsg=null;render()}
  else if(a==='tab-signup'){S.loginTab='signup';S.err=null;S.loginMsg=null;render()}
  else if(a==='send-otp'){
    const f=document.getElementById('lemail');
    const email=f?f.value.trim():'';
    if(!email){S.err='メールアドレスを入力してください。';render();return}
    S.err=null;
    const isSignup=(S.loginTab||'login')==='signup';
    const {error}=await sb.auth.signInWithOtp({email,options:{shouldCreateUser:isSignup}});
    if(error){
      const msg=error.message||'';
      if(!isSignup&&/not allowed|signups|not found/i.test(msg)){
        S.err='このメールアドレスは未登録です。「新規登録」タブからご登録ください。';
      }else if(/rate limit|too many|seconds/i.test(msg)){
        S.err='メール送信の回数制限に達しました。1時間ほど待ってからお試しください。';
      }else{
        S.err=`送信に失敗しました（${msg}）。アドレスを確認してください。`;
      }
      render();return;
    }
    S.loginEmail=email;S.loginStep='otp';
    S.loginMsg='6桁のコードを送りました。メールを確認してください。';
    render();
  }
  else if(a==='verify-otp'){
    const f=document.getElementById('lotp');
    const token=f?f.value.trim():'';
    if(!token||token.length!==6){S.err='6桁のコードを入力してください。';render();return}
    S.err=null;
    const {error}=await sb.auth.verifyOtp({email:S.loginEmail,token,type:'email'});
    if(error){S.err='コードが正しくありません。もう一度確認してください。';render();return;}
    S.loginStep='email';S.loginMsg=null;
  }
  else if(a==='back-email'){
    S.loginStep='email';S.loginMsg=null;S.err=null;render();
  }
  else if(a==='guest'){S.guest=true;localStorage.setItem('rinote_guest','1');S.err=null;await loadRecs();render()}
  else if(a==='logout'){
    if(S.guest){S.guest=false;localStorage.removeItem('rinote_guest');S.recs=[];S.view='list';render();return}
    await sb.auth.signOut();S.session=null;S.recs=[];render();
  }
  else if(a==='new'){S.d={name:'',reason:'',period:'',anxiety:'',signal:'',customSignal:'',stamp:'生きてる',finalThought:'',customThought:'',qty:null,avgPrice:null};S.res=null;S.err=null;S.info=null;S.notifSaved=false;S.view='form';render()}
  else if(a==='home'){S.view='list';S.err=null;render()}
  else if(a==='back-result'){S.view='result';render()}
  else if(a==='go'){gForm();await doCheck()}
  else if(a==='rewrite'){S.view='rewrite';render()}
  else if(a==='proceed'){S.view='confirm';render()}
  else if(a==='miokuri'){S.view='miokuri';render()}
  else if(a==='mio-save'){
    const f=document.getElementById('fm');
    await persist('見送り',(f?f.value.trim():'')||'(理由未記入)');
  }
  else if(a==='mio-none'){await persist('見送り','(理由なし)')}
  else if(a==='final-save'){
    gConfirm();
    if(S.d.customSignal)S.d.signal=S.d.customSignal;
    if(S.d.customThought)S.d.finalThought=S.d.customThought;
    if(!S.d.signal){S.err='売るときの見直し条件を入力してください。';render();return;}
    S.err=null;
    await persist('記録');
  }
  else if(a==='tab-port'){S.tab='port';render()}
  else if(a==='tab-note'){S.tab='note';render()}
  else if(a==='hist-toggle'){S.histOpen=!S.histOpen;render()}
  else if(a==='hold-edit'){S.holdEdit=true;render()}
  else if(a==='hold-cancel'){S.holdEdit=false;render()}
  else if(a==='hold-save'){
    const fq=document.getElementById('hqty'),fp=document.getElementById('hprice');
    const qty=(fq&&fq.value!=='')?parseFloat(fq.value):null;
    const avg=(fp&&fp.value!=='')?parseFloat(fp.value):null;
    const error=await dbUpdate(S.did,{qty,avg_price:avg});
    if(error&&/column|schema/i.test(error.message||'')){
      S.err='保有情報の保存にはデータベースの更新（qty・avg_price列の追加）が必要です。';render();return;
    }
    if(error){S.err='保有情報の保存に失敗しました。もう一度お試しください。';render();return;}
    S.err=null;S.holdEdit=false;
    await loadRecs();render();
  }
  else if(a==='filter-all'){S.filter='all';render()}
  else if(a==='filter-active'){S.filter='active';render()}
  else if(a==='filter-skip'){S.filter='skip';render()}
  else if(a==='recheck'){await doRecheck()}
  else if(a==='recheck-open'){
    const r=S.recs.find(x=>String(x.id)===String(S.did));
    S.recheckData={name:r?r.name:'',reason:r?r.reason:'',period:r?r.period||'':'',anxiety:r?r.anxiety||'':''};
    S.recheckOpen=true;render();
  }
  else if(a==='recheck-close'){S.recheckOpen=false;S.recheckData=null;render()}
  else if(a==='recheck-submit'){gRecheck();await doRecheck()}
  else if(a==='re-close'){await pushCheck('答え合わせ');S.rres=null;render()}
  else if(a==='del'){
    if(!confirm('この記録を削除します。照合の履歴も消えますが、よろしいですか？'))return;
    if(S.guest){guestSave(guestRecs().filter(x=>String(x.id)!==String(S.did)))}
    else{await sb.from('records').delete().eq('id',S.did)}
    await loadRecs();S.view='list';render();
  }
}
async function doCheck(){
  if(!S.d.name||!S.d.reason){S.err='銘柄と理由のふたつを先に埋めてください。';S.view='form';render();return}
  S.err=null;S.view='checking';render();
  try{S.res=await api('check',S.d);S.d.origReason=S.d.reason;S.view='result'}
  catch(e){S.err=e.message;S.view='form'}
  render();
}
function gRecheck(){
  const n=document.getElementById('rc-name'),r=document.getElementById('rc-reason'),a=document.getElementById('rc-anxiety');
  if(!S.recheckData)S.recheckData={};
  if(n)S.recheckData.name=n.value.trim();
  if(r)S.recheckData.reason=r.value.trim();
  if(a)S.recheckData.anxiety=a.value.trim();
}
async function doRecheck(){
  const r=S.recs.find(x=>String(x.id)===String(S.did));
  const d=S.recheckData?{...r,...S.recheckData}:r;
  S.rloading=true;S.err=null;render();
  try{S.rres=await api('recheck',d)}
  catch(e){S.err=e.message}
  S.rloading=false;S.recheckOpen=false;render();
}
async function persist(decision,mioWhy){
  const d=S.d,r=S.res||{};
  const base={
    name:d.name,
    reason:decision==='見送り'?mioWhy:d.reason,
    decision,period:d.period||'',anxiety:d.anxiety||'',signal:d.signal||'',
    checks:[{ts:Date.now(),status:decision==='見送り'?'見送り':(d.stamp||'生きてる'),
      conclusion:r.conclusion||'',facts:r.facts||[],basis:r.facts_basis||'',
      match_level:r.match_level||'',watch_points:r.watch_points||[],summary:r.summary||''}]
  };
  if(S.guest){
    const recs=guestRecs();
    recs.push({...base,id:Date.now(),created_at:new Date().toISOString(),
      final_thought:d.finalThought||'',qty:d.qty||null,avg_price:d.avgPrice||null});
    guestSave(recs);
  }else{
    let {error}=await sb.from('records').insert({...base,final_thought:d.finalThought||'',qty:d.qty||null,avg_price:d.avgPrice||null});
    if(error&&/column|schema/i.test(error.message||'')){
      ({error}=await sb.from('records').insert(base));
    }
    if(error){S.err='保存に失敗しました。通信環境を確認して、もう一度お試しください。';render();return;}
  }
  await loadRecs();
  S.info=decision==='見送り'
    ?`「${d.name}」を見送りとして記録しました。あとで「答え合わせ」ができます。`
    :`「${d.name}」を記録しました。次の決算が出たら、もう一度照合して理由を確かめましょう。`;
  S.view='list';S.d=null;S.res=null;render();
}
async function pushCheck(st){
  const rec=S.recs.find(x=>String(x.id)===String(S.did));
  if(!rec||!S.rres)return false;
  const checks=(rec.checks||[]).concat([{ts:Date.now(),status:st,
    conclusion:S.rres.conclusion||'',facts:S.rres.facts||[],basis:S.rres.basis||'',
    match_level:S.rres.match_level||'',summary:S.rres.summary||''}]);
  const error=await dbUpdate(rec.id,{checks});
  if(error){S.err='判定の保存に失敗しました。再試行してください。';return false;}
  await loadRecs();
  return true;
}
async function stamp(st){
  const ok=await pushCheck(st);
  if(ok)S.rres=null;
  render();
}
async function manualStamp(st){
  const rec=S.recs.find(x=>String(x.id)===String(S.did));
  if(!rec)return;
  if(lastStatus(rec)===st)return;
  const checks=(rec.checks||[]).concat([{ts:Date.now(),status:st,
    conclusion:'自分で判子を変更しました',facts:[],basis:''}]);
  const error=await dbUpdate(rec.id,{checks});
  if(error){S.err='判子の変更に失敗しました。再試行してください。';render();return;}
  S.err=null;
  await loadRecs();
  render();
}

(async()=>{
  const {data}=await sb.auth.getSession();
  S.session=data.session;
  sb.auth.onAuthStateChange(async(_e,session)=>{
    S.session=session;
    if(session){await loadRecs()}
    render();
  });
  if(S.session||S.guest)await loadRecs();
  render();
})();
</script>
</body>
</html>
